services:
  - type: web
    name: certificate-generator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 app:app
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FLASK_DEBUG
        value: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_OAUTH_TOKEN_JSON
        sync: false
